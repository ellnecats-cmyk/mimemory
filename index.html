<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Web Card</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard&display=swap" rel="stylesheet">

  <!-- 아이콘 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: 'Pretendard', sans-serif;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid #6366f1;
    }

    h2 {
      margin: 10px 0 5px;
      font-weight: 700;
    }    

    p {
      margin: 0;
      color: #cbd5f5;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      background: #6366f1;
      padding: 5px 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 12px;
    }

    .buttons {
      margin-top: 20px;
    }

    .button {
      display: block;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: #6366f1;
      transition: 0.2s;
      font-weight: 600;
    }

    .button:hover {
      background: #4f46e5;
      transform: scale(1.03);
    }

    .social i {
      margin: 0 8px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .social i:hover {
      color: #6366f1;
    }

  </style>
</head>

<body>

  <div class="card">
    <!-- 프로필 이미지 -->
    <img src="image1.jpg" alt="profile">

    <!-- 이름 -->
    <h2>홍미선</h2>

    <!-- 직업 -->
    <p>앱개발자 · 성장하는 개발자</p>

    <!-- 뱃지 -->
    <div class="badge">🚀 Developer</div>

    <!-- 버튼 -->
    <div class="buttons">
      <a href="https://appdev-beginner.blogspot.com/" class="button">Blog</a>
      <a href="https://github.com/ellnecats-cmyk" class="button">GitHub</a>
      <a href=
      "mailto:ellnecats@gmail.com?subject=포트폴리오%20문의&body=안녕하세요" class="button">Contact</a>
    </div>

    
  </div>

</body>
</html>
